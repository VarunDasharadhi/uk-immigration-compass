app = 'uk-immigration-compass'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    grace_period = '40s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    port = 10000
    timeout = '10s'
    type = 'http'
